name: Tests
on:
  push:
    branches: [main]
    paths-ignore:
      - 'TODO.md'
  pull_request:
    paths-ignore:
      - 'TODO.md'
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: toDoList_main/package-lock.json
      - name: Install dependencies
        working-directory: toDoList_main
        run: npm install
      - name: Run tests
        working-directory: toDoList_main
        run: npm run test:run
